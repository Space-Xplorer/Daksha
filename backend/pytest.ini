[pytest]
# Pytest configuration for Agentic Shield Orchestration System

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for workflow
    slow: Tests that take longer to run
    llm: Tests that require LLM API access
    model: Tests that require ML models

# Coverage options (optional)
# Uncomment to enable coverage reporting
# addopts = --cov=src --cov-report=html --cov-report=term

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (in seconds)
timeout = 30

# Ignore paths
norecursedirs = .git .tox dist build *.egg __pycache__ .kiro

# Python path
pythonpath = .
